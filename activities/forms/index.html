<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Forms</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">Form 1</a></li>
            <li><a href="#">Form 2</a></li>
            <li><a href="#">Form 3</a></li>
        </ul>
    </nav>
    <main>
        <form action="formprocs.html" method="get" id="myForm">
            <fieldset>
                <legend>Personal Information</legend>
                <div class="row">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="email@byuh.edu" required>
                </div>
                <div class="row">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="row">
                    <label for="country">Country:</label>
                    <select id="country" name="country">
                        <option value="">Select your country</option>
                        <option value="usa">United States</option>
                        <option value="canada">Canada</option>
                        <option value="mexico">Mexico</option>
                        <option value="utah">Utah</option>
                    </select>
                </div>
                <div class="checkrow">
                    <div class="spacer">Gender:</div>
                    <label><input type="radio" name="gender" value="male">Male</label>
                    <label><input type="radio" name="gender" value="female">Female</label>
                </div>
                <div class="checkrow">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="remember" value="check" checked>Remember me?</label>
                </div>
                <div class="row">
                    <label>Comment:</label>
                    <textarea name="comment" placeholder="Enter your comment here..."></textarea>
                </div>
                <div class="spacer">
                    <input type="submit" value="Submit">
                </div>
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Forms Activity</p>
    </footer>
</body>
</html>
<script>
    document.getElementById("myForm").addEventListener("submit", function(event) {
        event.preventDefault();

        const nameInput = document.getElementById("name").value;
        const emailInput = document.getElementById("email").value;
        const passwordInput = document.getElementById("password").value;

        if (nameInput === "" || emailInput === "" || passwordInput === "") {
            alert("Please fill in all required fields.");
            return;
        } else {
            alert("Form submitted successfully!");
        }

        const formData = {
            name: nameInput,
            email: emailInput,
            password: passwordInput
        };

        console.log("Form Data:", formData);
    });
</script>
