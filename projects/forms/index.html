<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Forms</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>IT Forms</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Ticket</a></li>
            <li><a href="#">Recents</a></li>
            <li><a href="#">Settings</a></li>
            <li><a href="#">FAQ</a></li>
        </ul>
    </nav>

    <aside>
        <h2>Categories</h2>
        <ul>
            <li><a href="#">Hardware</a></li>
            <li><a href="#">Software</a></li>
            <li><a href="#">Network</a></li>
            <li><a href="#">Security</a></li>
            <li><a href="#">Other</a></li>
        </ul>
    </aside>

    <main>
        <h2>Submit a Ticket</h2>
        <form action="#" method="post">
            <fieldset>
                <legend>Fill up this Form</legend>
                <div class="row">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="row">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required unique>
                </div>
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone">
                <div class="row">
                    <label for="birthday">Birthday</label>
                    <input type="date" name="birthday" id="birthday">
                </div>
                <div class="row">
                    <label for="gender">Gender:</label>
                    <select id="gender" name="gender">
                        <option value="">Select a gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="row">
                    <label for="category">Category:</label>
                    <select id="category" name="category" required>
                        <option value="">Select a category</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>
                        <option value="network">Network</option>
                        <option value="security">Security</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="row">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="5" required></textarea>
                </div>
                <div class="row">
                    <input type="checkbox" id="urgent" name="urgent">
                    <label for="urgent">Agree to terms and conditions.</label>
                </div>
                <div class="row">
                    <button type="submit">Submit Ticket</button>
                </div>
            </fieldset>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 IT Support. All rights reserved.</p>
    </footer>
</body>
</html>
